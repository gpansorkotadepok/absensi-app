<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Detail Peserta</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
  :root {
    --green:      #006633;
    --green-dark: #004d26;
    --green-light:#e8f5ee;
    --gold:       #c8972a;
    --gray-100:   #f5f5f5;
    --gray-200:   #e8e8e8;
    --gray-400:   #9e9e9e;
    --gray-700:   #424242;
    --radius:     16px;
    --shadow:     0 4px 20px rgba(0,0,0,0.08);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Inter', sans-serif; background: #f0f4f0; color: var(--gray-700); min-height: 100vh; }

  #loadingOverlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.45);
    backdrop-filter: blur(4px); display: flex; flex-direction: column;
    align-items: center; justify-content: center; z-index: 999; gap: 16px;
  }
  #loadingOverlay.hidden { display: none; }
  .spinner {
    width: 52px; height: 52px;
    border: 4px solid rgba(255,255,255,0.2);
    border-top: 4px solid #fff; border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .spinner-text { color: #fff; font-size: 14px; font-weight: 500; }
  .hidden { display: none !important; }

  .topbar {
    background: linear-gradient(135deg, var(--green-dark), var(--green));
    padding: 16px 20px; display: flex; align-items: center;
    justify-content: space-between; box-shadow: 0 2px 12px rgba(0,0,0,0.2);
    position: sticky; top: 0; z-index: 10;
  }
  .topbar-left { display: flex; align-items: center; gap: 12px; }
  .topbar-logo {
    width: 38px; height: 38px; border-radius: 50%; background: #fff;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden; flex-shrink: 0;
  }
  .topbar-logo img { width: 100%; height: 100%; object-fit: contain; }
  .topbar h1 { color: #fff; font-size: 16px; font-weight: 700; }
  .topbar p  { color: rgba(255,255,255,0.7); font-size: 12px; }
  .topbar-back {
    background: rgba(255,255,255,0.15); color: #fff;
    text-decoration: none; padding: 8px 14px;
    border-radius: 20px; font-size: 13px; font-weight: 600;
    transition: background 0.2s; white-space: nowrap;
  }
  .topbar-back:hover { background: rgba(255,255,255,0.25); }

  .wrapper { max-width: 680px; margin: 0 auto; padding: 20px 16px; }

  /* PROFILE CARD */
  .profile-card {
    background: #fff; border-radius: var(--radius);
    box-shadow: var(--shadow); overflow: hidden; margin-bottom: 20px;
  }
  .profile-header {
    background: linear-gradient(135deg, var(--green-dark), var(--green));
    padding: 28px 24px; display: flex; align-items: center; gap: 18px;
  }
  .avatar {
    width: 64px; height: 64px; border-radius: 50%;
    background: rgba(255,255,255,0.2);
    display: flex; align-items: center; justify-content: center;
    font-size: 28px; font-weight: 700; color: #fff;
    flex-shrink: 0; border: 3px solid rgba(255,255,255,0.3);
  }
  .profile-info h2 { color: #fff; font-size: 18px; font-weight: 700; }
  .profile-info p  { color: rgba(255,255,255,0.75); font-size: 13px; margin-top: 4px; }
  .profile-id {
    background: rgba(255,255,255,0.15); color: #fff;
    padding: 4px 10px; border-radius: 12px;
    font-size: 12px; font-family: monospace; margin-top: 6px; display: inline-block;
  }

  .profile-stats {
    display: grid; grid-template-columns: repeat(3, 1fr);
    border-top: 1px solid var(--gray-100);
  }
  .stat-item {
    padding: 16px; text-align: center;
    border-right: 1px solid var(--gray-100);
  }
  .stat-item:last-child { border-right: none; }
  .stat-item .val { font-size: 22px; font-weight: 700; color: var(--green); }
  .stat-item .lbl { font-size: 12px; color: var(--gray-400); margin-top: 2px; }
  .stat-item.red  .val { color: #e74c3c; }
  .stat-item.gold .val { color: var(--gold); }

  /* SESI LIST */
  .section-title {
    font-size: 15px; font-weight: 700; margin-bottom: 12px; color: var(--gray-700);
  }
  .sesi-list { display: flex; flex-direction: column; gap: 8px; }
  .sesi-item {
    background: #fff; border-radius: 12px;
    padding: 14px 16px; box-shadow: var(--shadow);
    display: flex; align-items: center; justify-content: space-between;
    gap: 12px; transition: transform 0.15s;
  }
  .sesi-item:hover { transform: translateX(3px); }
  .sesi-item.hadir { border-left: 4px solid var(--green); }
  .sesi-item.belum { border-left: 4px solid #e74c3c; }

  .sesi-left { flex: 1; min-width: 0; }
  .sesi-name { font-size: 14px; font-weight: 600; color: var(--gray-700); }
  .sesi-meta { font-size: 12px; color: var(--gray-400); margin-top: 3px; }

  .sesi-badge {
    width: 32px; height: 32px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; flex-shrink: 0;
  }
  .sesi-badge.hadir { background: #d1fae5; color: var(--green); }
  .sesi-badge.belum { background: #fee2e2; color: #e74c3c; }
</style>
</head>
<body>

<div id="loadingOverlay">
  <div class="spinner"></div>
  <div class="spinner-text">Memuat data peserta...</div>
</div>

<div class="topbar">
  <div class="topbar-left">
    <div class="topbar-logo">
      <img src="logo.png" alt="GP Ansor" onerror="this.style.display='none'">
    </div>
    <div>
      <h1>Detail Peserta</h1>
      <p>Gerakan Pemuda Ansor</p>
    </div>
  </div>
  <a href="dashboard.html" class="topbar-back">← Dashboard</a>
</div>

<div class="wrapper">
  <div class="profile-card" id="profileCard">
    <div class="profile-header">
      <div class="avatar" id="avatarInitial">?</div>
      <div class="profile-info">
        <h2 id="profNama">Memuat...</h2>
        <p id="profPelatihan"></p>
        <p id="profWilayah"></p>
        <span class="profile-id" id="profId"></span>
      </div>
    </div>
    <div class="profile-stats">
      <div class="stat-item">
        <div class="val" id="statTotal">—</div>
        <div class="lbl">Total Sesi</div>
      </div>
      <div class="stat-item">
        <div class="val" id="statHadir">—</div>
        <div class="lbl">Hadir</div>
      </div>
      <div class="stat-item gold">
        <div class="val" id="statPersen">—</div>
        <div class="lbl">Kehadiran</div>
      </div>
    </div>
  </div>

  <div class="section-title">📋 Riwayat Sesi</div>
  <div class="sesi-list" id="sesiList"></div>
</div>

<script>
const API_URL = 'https://script.google.com/macros/s/AKfycbyO6acFGHzzJC8kdFWvR7kMytbLRn8TNsZI0BlJIPRaMmeRBmsqPOXohXHnEzuaeYT6tw/exec';

async function loadDetail() {
  const params    = new URLSearchParams(window.location.search);
  const id        = params.get('id');
  const pelatihan = params.get('pelatihan');

  if (!id || !pelatihan) {
    alert('Parameter tidak lengkap');
    window.location.href = 'dashboard.html';
    return;
  }

  try {
    const res  = await fetch(API_URL, {
      method: 'POST',
      body: JSON.stringify({ action: 'getPesertaDetail', id, pelatihan })
    });
    const data = await res.json();

    if (!data.success) { alert(data.message); return; }

    const p = data.peserta;
    document.getElementById('avatarInitial').textContent = p.nama.charAt(0).toUpperCase();
    document.getElementById('profNama').textContent      = p.nama;
    document.getElementById('profPelatihan').textContent = '📚 ' + p.pelatihan;
    document.getElementById('profWilayah').textContent   = '📍 ' + p.wilayah;
    document.getElementById('profId').textContent        = p.id;

    const persen = data.totalSesi ? Math.round((data.hadirCount / data.totalSesi) * 100) : 0;
    document.getElementById('statTotal').textContent  = data.totalSesi;
    document.getElementById('statHadir').textContent  = data.hadirCount;
    document.getElementById('statPersen').textContent = persen + '%';

    const sesiList = document.getElementById('sesiList');
    sesiList.innerHTML = '';
    data.sesiStatus.forEach(s => {
      const div = document.createElement('div');
      div.className = 'sesi-item ' + (s.hadir ? 'hadir' : 'belum');
      div.innerHTML = `
        <div class="sesi-left">
          <div class="sesi-name">${s.sesi}</div>
          <div class="sesi-meta">
            ${s.hadir
              ? `✅ ${s.tanggal} &nbsp;·&nbsp; ${s.jam} &nbsp;·&nbsp; Petugas: ${s.petugas}`
              : '❌ Belum absen'}
          </div>
        </div>
        <div class="sesi-badge ${s.hadir ? 'hadir' : 'belum'}">${s.hadir ? '✓' : '✗'}</div>
      `;
      sesiList.appendChild(div);
    });

  } catch(e) {
    alert('Gagal terhubung ke server');
  } finally {
    document.getElementById('loadingOverlay').classList.add('hidden');
  }
}

loadDetail();
</script>
</body>
</html>
